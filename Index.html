<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乂 T O X I C ╰︿╯ X-SQUAD</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --card-bg: #111;
            --toxic-red: #ff003c;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            text-shadow: 0 0 20px var(--neon-green);
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--neon-green);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            box-shadow: 0 0 20px var(--neon-green);
            transform: translateY(-5px);
        }

        .card h2 {
            border-bottom: 1px solid var(--neon-green);
            padding-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        input {
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            width: 90%;
            margin: 10px 0;
            outline: none;
        }

        button {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover {
            background: #000;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        #terminal {
            width: 100%;
            max-width: 1000px;
            height: 150px;
            background: #000;
            border: 1px solid var(--neon-green);
            margin-top: 30px;
            padding: 10px;
            font-size: 0.8rem;
            overflow-y: auto;
            color: #00ff41;
        }

        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 255, 65, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(0, 255, 65, 0); }
        }
    </style>
</head>
<body>

    <h1 class="pulse">乂 T O X I C ╰︿╯ X-SQUAD</h1>

    <div class="container">
        <div class="card">
            <h2>🛡️ GLORY_BOT</h2>
            <p>Status: <span id="glory-status">OFFLINE</span></p>
            <input type="text" id="glory-uid" placeholder="Enter Target UID">
            <button onclick="deployBot('glory')">Activate Glory Push</button>
        </div>

        <div class="card">
            <h2>🕹️ REMOTE_BOT</h2>
            <p>Status: <span id="remote-status">OFFLINE</span></p>
            <input type="text" id="remote-uid" placeholder="Enter Target UID">
            <button onclick="deployBot('remote')">Start Emote Spam</button>
        </div>

        <div class="card" style="border-color: #ff003c;">
            <h2 style="color: #ff003c; border-color: #ff003c;">👕 DRESS_BOT</h2>
            <p>Status: <span id="dress-status">OFFLINE</span></p>
            <input type="text" id="team-code" placeholder="Enter Team Code">
            <button style="background: #ff003c; color: white;" onclick="deployBot('dress')">Inject Sakura/V-Badge</button>
        </div>
    </div>

    <div id="terminal">> System Initialized... Waiting for command.</div>

    <script>
        // ⚠️ SABSE ZAROORI: Apna Railway Link yahan paste karo!
        const RAILWAY_URL = "https://your-app-name.up.railway.app"; 

        async function deployBot(type) {
            const terminal = document.getElementById('terminal');
            const statusLabel = document.getElementById(`${type}-status`);
            
            let payload = {};
            if (type === 'dress') {
                payload = { team_code: document.getElementById('team-code').value };
            } else {
                payload = { uid: document.getElementById(`${type}-uid`).value };
            }

            terminal.innerHTML += `<br>> [SENDING] Requesting ${type.toUpperCase()} module...`;

            try {
                const response = await fetch(`${RAILWAY_URL}/execute/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    statusLabel.innerText = "ACTIVE";
                    statusLabel.style.color = "var(--neon-green)";
                    terminal.innerHTML += `<br>> [SUCCESS] ${data.message}`;
                } else {
                    throw new Error("Server Error");
                }
            } catch (error) {
                terminal.innerHTML += `<br>> [ERROR] Connection failed. Check Railway Link.`;
                console.error(error);
            }
            terminal.scrollTop = terminal.scrollHeight;
        }
    </script>
</body>
</html>
